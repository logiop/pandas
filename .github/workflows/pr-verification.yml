name: PR Verification & Quality Assurance

on:
  pull_request:
    paths:
      - 'pandas/tests/**'
      - 'pyproject.toml'
      - '.pre-commit-config.yaml'

jobs:
  verify-pr:
    name: Comprehensive PR Verification
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . --no-build-isolation --quiet
          pip install pytest pytest-xdist pre-commit

      - name: Run verify_pr.py
        id: verify
        continue-on-error: true
        run: |
          python verify_pr.py --verbose --json > pr_report.json
          cat pr_report.json

      - name: Run pre-commit hooks
        id: pre-commit
        continue-on-error: true
        run: |
          pre-commit run --all-files

      - name: Get changed test files
        id: changed-tests
        run: |
          echo "files=$(git diff --name-only HEAD~1 | grep 'tests.*\.py$' | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Run pytest on changed files
        id: pytest
        continue-on-error: true
        run: |
          if [ -n "${{ steps.changed-tests.outputs.files }}" ]; then
            python -m pytest ${{ steps.changed-tests.outputs.files }} -v --tb=short
          else
            echo "No test files changed"
          fi

      - name: Upload PR report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: pr-verification-report-py${{ matrix.python-version }}
          path: pr_report.json

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('pr_report.json', 'utf8'));

            const comment = `
## ✅ PR Verification Report (Python ${{ matrix.python-version }})

### Summary
- **Files Checked**: ${report.total_files_checked}
- **Total Issues**: ${report.total_issues}
- **Errors**: ${report.errors}
- **Warnings**: ${report.warnings}
- **Passed Checks**: ${report.passed_checks.length}

${report.passed_checks.length > 0 ? `### ✓ Passed Checks
${report.passed_checks.map(c => `- ${c}`).join('\n')}` : ''}

${report.failed_checks.length > 0 ? `### ✗ Failed Checks
${report.failed_checks.map(c => `- ${c}`).join('\n')}` : ''}

${report.errors > 0 ? `### 🔴 Critical Issues
${report.issues.filter(i => i.severity === 'ERROR').slice(0, 5).map(i => `
- \`${i.file}:${i.line}\`
  ${i.message}
  ${i.suggestion ? `💡 ${i.suggestion}` : ''}
`).join('\n')}` : ''}

${report.warnings > 0 ? `### 🟡 Warnings
${report.issues.filter(i => i.severity === 'WARNING').slice(0, 3).map(i => `
- \`${i.file}:${i.line}\`
  ${i.message}
`).join('\n')}` : ''}

---
*Generated by PR Verification Script*
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: verify-pr
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install pandas
        run: |
          python -m pip install --upgrade pip
          pip install -e . --no-build-isolation --quiet

      - name: Run full test suite on changed files
        run: |
          changed=$(git diff --name-only HEAD~1 | grep 'tests.*\.py$')
          if [ -n "$changed" ]; then
            python -m pytest $changed -xvs --tb=short --durations=10
          fi

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install mypy
        run: |
          pip install mypy

      - name: Type check changed test files
        run: |
          changed=$(git diff --name-only HEAD~1 | grep 'tests.*\.py$')
          if [ -n "$changed" ]; then
            mypy $changed --no-error-summary --warn-unused-ignores || true
          fi
